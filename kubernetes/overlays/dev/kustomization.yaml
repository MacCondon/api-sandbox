apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: api-sandbox-dev

resources:
  - ../../base

# NOTE: The CI/CD pipeline will update the newName and newTag values
# After running Terraform, update newName with your ECR repository URL from:
# terraform output ecr_repository_url
images:
  - name: api-sandbox
    newName: 862087104112.dkr.ecr.us-west-2.amazonaws.com/api-sandbox-dev
    newTag: c4cccac

replicas:
  - name: api-sandbox
    count: 2
